spring.application.name=${APP_NAME:bloc-backend}
server.port=${SERVER_PORT:8080}
server.error.include-message=always
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
app.auth.supabase.url=${SUPABASE_URL:}
app.auth.supabase.publishable-key=${SUPABASE_PUBLISHABLE_KEY:}
app.auth.supabase.jwt-secret=${SUPABASE_JWT_SECRET:}
app.auth.supabase.jwk-set-uri=${SUPABASE_JWK_SET_URI:}
app.auth.supabase.issuer=${SUPABASE_ISSUER:}
app.auth.supabase.audience=${SUPABASE_AUDIENCE:authenticated}
